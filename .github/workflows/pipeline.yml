name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        npm install
        npx playwright install

    - name: Run UI tests
      run: npm run test-ui

    - name: Run API tests
      run: |
        # Start stubby in background
        npx stubby -d ./resources/2_api/mock-api.yaml --port 8882 --host 127.0.0.1 --stubs-only &
        STUBBY_PID=$!

        # รอ stubby เริ่มทำงาน (sleep 3 วินาที)
        sleep 3

        # Run API test
        npm run test-api

        # Stop stubby
        kill $STUBBY_PID

    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report   # artifact name ไม่ซ้ำเพราะ job เดียว
        path: playwright-report
