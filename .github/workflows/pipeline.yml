name: Playwright Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - type: ui
          - type: api

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install dependencies
      run: |
        npm install
        npx playwright install

    - name: Run UI tests
      if: matrix.type == 'ui'
      run: npm run test-ui
    - name: Run API tests
      if: matrix.type == 'api'
      run: npx start-server-and-test "npx stubby -d ./resources/2_api/mock-api.yaml --port 8882 --host 127.0.0.1 --stubs-only" http://127.0.0.1:8882/api/users/12 "npm run test-api"
    - name: Upload Playwright Report
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report
